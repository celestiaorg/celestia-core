syntax = "proto3";
package tendermint.mempool;

option go_package = "github.com/cometbft/cometbft/proto/tendermint/mempool";

import "gogoproto/gogo.proto";
import "tendermint/libs/bits/types.proto";
import "tendermint/crypto/proof.proto";

// Txs is retained as a standalone marshalling helper used by
// consensus/propagation for serialising transaction bytes into block parts.
// It is no longer part of the mempool channel's oneof.
message Txs {
  repeated bytes txs = 1;
}

// SeenLargeTx announces a chunked, erasure-coded transaction. See ADR-013.
// num_parts == 1 indicates the no-parity single-chunk degenerate case.
message SeenLargeTx {
  bytes          tx_key      = 1;
  bytes          parts_root  = 2;
  uint32         num_parts   = 3;
  uint32         last_length = 4;
  bytes          signer      = 5;
  uint64         sequence    = 6;
  repeated bytes leaf_hashes = 7;
}

// HaveTxChunks advertises which chunks the sender holds for a given tx.
message HaveTxChunks {
  bytes                         tx_key = 1;
  tendermint.libs.bits.BitArray parts  = 2 [(gogoproto.nullable) = false];
}

// WantTxChunks requests one or more chunks for a given tx. The recipient
// answers with a TxChunks message containing the chunks it holds.
message WantTxChunks {
  bytes                         tx_key = 1;
  tendermint.libs.bits.BitArray parts  = 2 [(gogoproto.nullable) = false];
}

// TxChunk is a single chunk plus its Merkle proof against SeenLargeTx.parts_root.
// The proof field is empty for num_parts == 1.
message TxChunk {
  uint32                  index = 1;
  bytes                   data  = 2;
  tendermint.crypto.Proof proof = 3 [(gogoproto.nullable) = false];
}

// TxChunks batches up to ~16 chunks for a single tx in one envelope.
message TxChunks {
  bytes             tx_key = 1;
  repeated TxChunk  chunks = 2 [(gogoproto.nullable) = false];
}

message Message {
  oneof sum {
    SeenLargeTx  seen_large_tx  = 4;
    HaveTxChunks have_tx_chunks = 5;
    WantTxChunks want_tx_chunks = 6;
    TxChunks     tx_chunks      = 7;
  }
}
