syntax = "proto3";
package tendermint.mempool;

option go_package = "github.com/cometbft/cometbft/proto/tendermint/mempool";

message Txs {
  // Deprecated: batching is disabled; use the singular tx field instead. This
  // field is retained only for backward compatibility with peers that still
  // send transactions in the repeated field.
  repeated bytes txs = 1 [deprecated = true];
  // tx carries a single transaction. This is the field CAT populates when
  // sending transactions.
  bytes tx = 2;
}

message SeenTx {
  bytes  tx_key   = 1;
  uint64 sequence = 2;
  bytes  signer   = 3;
}

message WantTx {
  bytes tx_key = 1;
}

message Message {
  oneof sum {
    Txs    txs     = 1;
    SeenTx seen_tx = 2;
    WantTx want_tx = 3;
  }
}
