syntax = "proto3";
package tendermint.mempool;

option go_package = "github.com/cometbft/cometbft/proto/tendermint/mempool";

message Txs {
  repeated bytes txs = 1;
}

message SeenTx {
  bytes  tx_key   = 1;
  uint64 sequence = 2;
  bytes  signer   = 3;
}

message WantTx {
  bytes tx_key = 1;
}

// TxManifest advertises a large transaction by describing it as an ordered list
// of fixed-size chunks. It replaces the SeenTx + WantTx + full Txs round trip for
// transactions above the large-tx threshold, allowing receivers to fetch chunks
// from multiple peers in parallel.
message TxManifest {
  bytes  tx_key       = 1;
  uint32 tx_size      = 2;
  uint32 chunk_size   = 3;
  uint32 chunk_count  = 4;
  repeated bytes chunk_hashes = 5;
  uint64 sequence     = 6;
  bytes  signer       = 7;
  uint64 priority     = 8;
}

// WantChunk requests one or more chunks of a large transaction identified by
// tx_key. Indexes are zero-based positions into the manifest's chunk list.
message WantChunk {
  bytes  tx_key  = 1;
  repeated uint32 indexes = 2;
}

// TxChunk carries the bytes of a single chunk of a large transaction. The
// receiver verifies data against the chunk hash advertised in the manifest.
message TxChunk {
  bytes  tx_key = 1;
  uint32 index  = 2;
  bytes  data   = 3;
}

message Message {
  oneof sum {
    Txs        txs          = 1;
    SeenTx     seen_tx      = 2;
    WantTx     want_tx      = 3;
    TxManifest tx_manifest  = 4;
    WantChunk  want_chunk   = 5;
    TxChunk    tx_chunk     = 6;
  }
}
