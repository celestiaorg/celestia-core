syntax = "proto3";
package tendermint.mempool;

option go_package = "github.com/cometbft/cometbft/proto/tendermint/mempool";

message Txs {
  // Deprecated: use the Tx message instead. Retained only for backward
  // compatibility with peers that still send transactions in this field.
  repeated bytes txs = 1 [deprecated = true];
}

message Tx {
  bytes tx = 1;
}

message SeenTx {
  bytes  tx_key   = 1;
  uint64 sequence = 2;
  bytes  signer   = 3;
}

message WantTx {
  bytes tx_key = 1;
}

message Message {
  oneof sum {
    Txs    txs     = 1;
    SeenTx seen_tx = 2;
    WantTx want_tx = 3;
    Tx     tx      = 4;
  }
}
