syntax = "proto3";
package tendermint.mempool;

option go_package = "github.com/cometbft/cometbft/proto/tendermint/mempool";

message Txs {
  repeated bytes txs = 1;
}

message SeenTx {
  bytes  tx_key   = 1;
  uint64 sequence = 2;
  bytes  signer   = 3;
}

message WantTx {
  bytes tx_key = 1;
}

message TxManifest {
  bytes           tx_key             = 1;
  uint32          tx_size            = 2;
  uint32          chunk_size         = 3;
  uint32          chunk_count        = 4;
  repeated bytes  chunk_hashes       = 5;
  uint64          sequence           = 6;
  bytes           signer             = 7;
  uint64          priority           = 8;
  repeated uint32 optimistic_indexes = 9;
  bool            speculative        = 10;
  uint32          fountain_data_count = 11;
  uint32          fountain_symbol_count = 12;
  repeated bytes  fountain_symbol_hashes = 13;
  repeated uint32 optimistic_symbol_indexes = 14;
}

message WantChunk {
  bytes           tx_key  = 1;
  repeated uint32 indexes = 2;
}

message TxChunk {
  bytes  tx_key = 1;
  uint32 index  = 2;
  bytes  data   = 3;
}

message HaveTxSymbols {
  bytes           tx_key  = 1;
  repeated uint32 indexes = 2;
}

message WantTxSymbols {
  bytes           tx_key  = 1;
  repeated uint32 indexes = 2;
}

message TxSymbol {
  bytes  tx_key = 1;
  uint32 index  = 2;
  bytes  data   = 3;
}

message Message {
  oneof sum {
    Txs           txs             = 1;
    SeenTx        seen_tx         = 2;
    WantTx        want_tx         = 3;
    TxManifest    tx_manifest     = 4;
    WantChunk     want_chunk      = 5;
    TxChunk       tx_chunk        = 6;
    HaveTxSymbols have_tx_symbols = 7;
    WantTxSymbols want_tx_symbols = 8;
    TxSymbol      tx_symbol       = 9;
  }
}
